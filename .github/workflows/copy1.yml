name: Copy YimMenu.dll to Yim folder

on:
  push:
    paths:
      - 'YimMenu.dll'

jobs:
  copy-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy file
        run: |
          mkdir -p Yim
          cp YimMenu.dll Yim/YimMenu.dll

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Yim/YimMenu.dll

          git diff --cached --quiet || git commit -m "Auto-copy YimMenu.dll to Yim folder"
          git push
